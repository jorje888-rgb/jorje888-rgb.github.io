<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(-45deg, #0f172a, #1e3a8a, #6d28d9, #0ea5e9);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 20px;
    text-align: center;
}

h1 {
    font-size: 52px;
    margin-bottom: 10px;
}

.subtitle {
    opacity: 0.8;
    font-size: 18px;
}

.card {
    background: rgba(0,0,0,0.3);
    padding: 20px;
    margin-top: 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: rgba(0,0,0,0.5);
}

a {
    color: #93c5fd;
}
</style>
</head>

<body>

<div class="container">

    <h1>Your Name</h1>
    <div class="subtitle">Developer • Linux • Git • Web</div>

    <div class="card">
        <h2>About Me</h2>
        <p>I build websites, learn Linux, and explore programming.</p>
    </div>

    <div class="card">
        <h2>Projects</h2>
        <p>Portfolio Website (GitHub Pages)</p>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>GitHub: <a href="https://github.com/YOUR_USERNAME">YOUR_USERNAME</a></p>
    </div>

</div>

</body>
</html>
